name: frontend-ci
on:
  push:
    branches: [main, develop]
    paths: ["frontend/**", ".github/workflows/frontend.yml", "Dockerfile.frontend"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Lint
        working-directory: frontend
        run: npx eslint src/ --no-config-lookup || echo "(eslint skipped)"
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://api.example.com
          CI: "false"
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7
