name: frontend-ci
on:
  push:
    branches: [main, develop]
    paths: ["frontend/**", ".github/workflows/frontend.yml", "Dockerfile.frontend"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Install
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: yarn eslint src/ --no-config-lookup || echo "(eslint skipped)"
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://api.example.com
        run: yarn build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7
