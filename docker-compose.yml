# SkillSphere — full stack docker compose
# Local dev: docker compose up --build
# Stack: nginx → (frontend SPA + backend FastAPI) → MongoDB + Redis
version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: skl-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [skl]

  redis:
    image: redis:7-alpine
    container_name: skl-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks: [skl]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: skl-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: ${DB_NAME:-skillsphere}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "10080"
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_SECRET: ${SUPERADMIN_SECRET}
      SUPERADMIN_ROUTE: ${SUPERADMIN_ROUTE:-core-access-x7k9m2}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDER_EMAIL: ${SENDER_EMAIL:-onboarding@resend.dev}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      APP_NAME: skillsphere
      PISTON_API_URL: http://piston:2000/api/v2
    depends_on:
      mongodb: { condition: service_healthy }
      redis:   { condition: service_healthy }
      piston:  { condition: service_started }
    expose: ["8001"]
    networks: [skl]

  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: skl-piston
    restart: unless-stopped
    privileged: true
    tmpfs:
      - /piston/jobs
    volumes:
      - piston_packages:/piston/packages
    environment:
      PISTON_LOG_LEVEL: INFO
      PISTON_DISABLE_NETWORKING: "true"
      PISTON_MAX_CONCURRENT_JOBS: "10"
    expose: ["2000"]
    networks: [skl]
    # On first start, install language packs (run once after `docker compose up`):
    #   docker exec skl-piston cli/index.js ppman install python javascript typescript java c++ c go rust ruby

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost}
    container_name: skl-frontend
    restart: unless-stopped
    expose: ["3000"]
    depends_on: [backend]
    networks: [skl]

  nginx:
    image: nginx:alpine
    container_name: skl-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [frontend, backend]
    networks: [skl]

  # ----- Observability stack -----
  prometheus:
    image: prom/prometheus:latest
    container_name: skl-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    ports: ["9090:9090"]
    networks: [skl]

  grafana:
    image: grafana/grafana:latest
    container_name: skl-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports: ["3001:3000"]
    networks: [skl]

volumes:
  mongo_data:
  redis_data:
  prom_data:
  grafana_data:
  piston_packages:

networks:
  skl:
    driver: bridge
